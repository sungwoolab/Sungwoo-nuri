<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>17심찰나 인식과정 — 아비담마</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0f1117;
      --bg2:       #181c27;
      --bg3:       #1f2436;
      --border:    rgba(255,255,255,0.08);
      --border2:   rgba(255,255,255,0.14);
      --text:      #e8eaf0;
      --text2:     #9aa0b4;
      --text3:     #5c6278;
      --accent:    #a78bfa;
      --accent2:   #7c5fcf;

      --bg-wave:   #132030;
      --tx-wave:   #5fcfaa;
      --bg-gate:   #0e1f35;
      --tx-gate:   #60a8e8;
      --bg-recv:   #1a1535;
      --tx-recv:   #a78bfa;
      --bg-java:   #2a1a08;
      --tx-java:   #f5a742;
      --bg-reg:    #0e2215;
      --tx-reg:    #5fcc80;

      --lead-bg:   #7c1d1d;
      --lead-tx:   #fca5a5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      padding: 2rem 1.5rem 4rem;
    }

    /* ── 헤더 ── */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .header-sub {
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .header h1 {
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }
    .header-desc {
      font-size: 13px;
      color: var(--text2);
      margin-top: 8px;
      line-height: 1.6;
    }

    /* ── 탭 ── */
    .tab-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1.5rem;
      justify-content: center;
    }
    .tab {
      padding: 7px 18px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text2);
      transition: all 0.2s;
      font-family: 'Noto Sans KR', sans-serif;
    }
    .tab:hover { border-color: var(--accent2); color: var(--text); }
    .tab.on {
      background: var(--accent2);
      color: #fff;
      border-color: transparent;
    }

    /* ── 찰나 트랙 ── */
    .vithi-scroll {
      overflow-x: auto;
      padding-bottom: 6px;
      margin-bottom: 12px;
    }
    .vithi-track {
      display: flex;
      gap: 5px;
      min-width: max-content;
    }
    .cell {
      width: 60px;
      flex-shrink: 0;
      cursor: pointer;
      border-radius: 10px;
      border: 1.5px solid transparent;
      transition: all 0.18s;
      text-align: center;
      padding: 0 2px 6px;
    }
    .cell:hover { transform: translateY(-3px); }
    .cell.active { border-color: var(--accent); box-shadow: 0 0 10px rgba(167,139,250,0.3); }
    .cell-num {
      font-size: 9px;
      color: var(--text3);
      padding: 3px 0 2px;
    }
    .cell-inner {
      border-radius: 7px;
      padding: 6px 3px 7px;
    }
    .cell-name {
      font-size: 10px;
      font-weight: 500;
      line-height: 1.3;
      min-height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cell-pali {
      font-size: 9px;
      margin-top: 3px;
      opacity: 0.7;
      line-height: 1.2;
    }

    /* 색상 */
    .c-bg   { background: var(--bg-wave); color: var(--tx-wave); }
    .c-va   { background: var(--bg-gate); color: var(--tx-gate); }
    .c-sa   { background: var(--bg-recv); color: var(--tx-recv); }
    .c-ja   { background: var(--bg-java); color: var(--tx-java); }
    .c-td   { background: var(--bg-reg);  color: var(--tx-reg);  }

    /* ── 범례 ── */
    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
      padding: 10px 14px;
      background: var(--bg2);
      border-radius: 10px;
      border: 1px solid var(--border);
    }
    .leg-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text2);
    }
    .leg-dot {
      width: 10px; height: 10px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    /* ── 상세 패널 ── */
    .detail-box {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: 18px;
      min-height: 200px;
    }
    .hint {
      font-size: 13px;
      color: var(--text3);
      text-align: center;
      padding: 50px 0;
    }
    .detail-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }
    .detail-info { flex: 1; }
    .detail-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
    }
    .detail-pali {
      font-size: 11px;
      color: var(--text3);
      margin-bottom: 6px;
      font-style: italic;
    }
    .detail-desc {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.65;
    }
    .detail-badge {
      padding: 5px 12px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .ceta-section {
      margin-top: 14px;
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }
    .ceta-label {
      font-size: 10px;
      font-weight: 500;
      color: var(--text3);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 9px;
    }
    .ceta-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .ceta-tag {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 99px;
      line-height: 1.4;
    }
    .ceta-common {
      background: rgba(95, 207, 170, 0.12);
      color: var(--tx-wave);
      border: 1px solid rgba(95, 207, 170, 0.2);
    }
    .ceta-add {
      background: rgba(167, 139, 250, 0.12);
      color: var(--accent);
      border: 1px solid rgba(167, 139, 250, 0.2);
    }
    .ceta-lead {
      background: var(--lead-bg);
      color: var(--lead-tx);
      border: 1px solid rgba(252,165,165,0.3);
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .lead-badge {
      font-size: 9px;
      background: rgba(255,255,255,0.15);
      padding: 1px 6px;
      border-radius: 99px;
      white-space: nowrap;
    }
    .ceta-none {
      font-size: 12px;
      color: var(--text3);
      font-style: italic;
    }

    .lead-notice {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: rgba(124,29,29,0.25);
      border: 1px solid rgba(252,165,165,0.2);
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 12px;
      font-size: 12px;
      color: var(--lead-tx);
      line-height: 1.55;
    }
    .lead-notice-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

    /* 스크롤바 */
    .vithi-scroll::-webkit-scrollbar { height: 4px; }
    .vithi-scroll::-webkit-scrollbar-track { background: var(--bg2); border-radius: 99px; }
    .vithi-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

    /* 반응형 */
    @media (max-width: 480px) {
      body { padding: 1.5rem 1rem 3rem; }
      .cell { width: 52px; }
    }
  </style>
</head>

const badgeStyle = {
  '바왕가':    'background:var(--bg-wave);color:var(--tx-wave);',
  '전향':      'background:var(--bg-gate);color:var(--tx-gate);',
  '오식':      'background:var(--bg-gate);color:var(--tx-gate);',
  '받아들임':  'background:var(--bg-recv);color:var(--tx-recv);',
  '조사':      'background:var(--bg-recv);color:var(--tx-recv);',
  '결정':      'background:var(--bg-recv);color:var(--tx-recv);',
  '자와나':    'background:var(--bg-java);color:var(--tx-java);',
  '따달람바나':'background:var(--bg-reg);color:var(--tx-reg);',
};

let current = v5;
let sel = null;

function setVithi(type) {
  current = type === '5door' ? v5 : vMind;
  sel = null;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('on', (type==='5door'&&i===0)||(type==='mind'&&i===1));
  });
  render();
}

function render() {
  const track = document.getElementById('vithi-track');
  track.innerHTML = '';
  current.forEach((c, i) => {
    const cell = document.createElement('div');
    cell.className = 'cell ' + c.type + (sel===i ? ' active' : '');
    cell.innerHTML = `
      <div class="cell-num">${c.num}</div>
      <div class="cell-inner">
        <div class="cell-name">${c.name}</div>
        <div class="cell-pali">${c.pali.split(' ')[0]}</div>
      </div>`;
    cell.onclick = () => { sel = i; render(); showDetail(c); };
    track.appendChild(cell);
  });
  if (sel !== null) showDetail(current[sel]);
}

function showDetail(c) {
  const box = document.getElementById('detail-box');
  const bs = badgeStyle[c.role] || '';

  const commonTags = C7.map(t => {
    const isLead = c.isJavana && t.startsWith('의도');
    if (isLead) {
      return `<span class="ceta-tag ceta-lead">★ ${t}<span class="lead-badge">전체를 리드함</span></span>`;
    }
    return `<span class="ceta-tag ceta-common">${t}</span>`;
  }).join('');

  const addTags = c.add.length
    ? c.add.map(t => `<span class="ceta-tag ceta-add">${t}</span>`).join('')
    : '<span class="ceta-none">이 찰나에 추가되는 마음부수 없음</span>';

  const leadNotice = c.isJavana ? `
    <div class="lead-notice">
      <span class="lead-notice-icon">★</span>
      이 찰나는 <strong>속행(자와나)</strong> 구간입니다.
      공통 마음부수 중 <strong>의도(Cetanā)</strong>가 전체 속행 과정을 이끌며 선·불선 업(業)을 형성합니다.
    </div>` : '';

  box.innerHTML = `
    <div class="detail-top">
      <div class="detail-info">
        <div class="detail-title">${c.num}. ${c.name}</div>
        <div class="detail-pali">${c.pali}</div>
        <div class="detail-desc">${c.desc}</div>
      </div>
      <span class="detail-badge" style="${bs}">${c.role}</span>
    </div>
    <div class="ceta-section">
      ${leadNotice}
      <div class="ceta-label">모든 찰나에 공통으로 작동하는 마음부수 (7가지)</div>
      <div class="ceta-grid">${commonTags}</div>
      <div class="ceta-label">이 찰나에 추가로 작동하는 마음부수</div>
      <div class="ceta-grid">${addTags}</div>
    </div>`;
}

render();
</script>
